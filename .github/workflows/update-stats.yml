name: Update stats

permissions:
  contents: write

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:        # manual run

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Find stats folder on the server
        id: locate
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SERVER_DIR: /g586731/paperspigot
        run: |
          set -euo pipefail

          ftp_run() {
            lftp -u "g586731,$FTP_PASSWORD" ftp://134.255.225.150 -e "
              set ssl:verify-certificate no;
              set net:timeout 20;
              $1
              bye
            "
          }

          # The live world is whatever level-name says in server.properties
          ftp_run "get -O . '$SERVER_DIR/server.properties';" || true
          LEVEL=$(grep -E '^level-name=' server.properties 2>/dev/null | cut -d= -f2- | tr -d '\r' || true)
          if [ -z "$LEVEL" ]; then
            echo "::error::level-name nicht aus $SERVER_DIR/server.properties lesbar."
            exit 1
          fi
          echo "Welt laut server.properties: $LEVEL"

          # Paper 1.21+ keeps the files in players/stats, older builds in stats
          STATS_PATH=""
          for CANDIDATE in "$SERVER_DIR/$LEVEL/players/stats" "$SERVER_DIR/$LEVEL/stats"; do
            if ftp_run "cls -1 '$CANDIDATE';" > /dev/null 2>&1; then
              STATS_PATH="$CANDIDATE"
              break
            fi
            echo "Nicht vorhanden: $CANDIDATE"
          done

          if [ -z "$STATS_PATH" ]; then
            echo "Weder players/stats noch stats gefunden, Inhalt der Welt:"
            ftp_run "find -d 2 '$SERVER_DIR/$LEVEL';" || true
            echo "::error::Kein Statistik-Ordner in $SERVER_DIR/$LEVEL gefunden."
            exit 1
          fi

          echo "Statistik-Ordner: $STATS_PATH"
          echo "stats_path=$STATS_PATH" >> "$GITHUB_OUTPUT"
          echo "usercache=$SERVER_DIR/usercache.json" >> "$GITHUB_OUTPUT"

      - name: Download stats via FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          STATS_PATH: ${{ steps.locate.outputs.stats_path }}
          USERCACHE: ${{ steps.locate.outputs.usercache }}
        run: |
          set -euo pipefail
          mkdir -p world/stats

          lftp -u "g586731,$FTP_PASSWORD" ftp://134.255.225.150 -e "
            set ssl:verify-certificate no;
            set net:timeout 20;
            set cmd:fail-exit yes;
            mirror --only-newer '$STATS_PATH' world/stats;
            bye
          "

          if [ -n "$USERCACHE" ]; then
            lftp -u "g586731,$FTP_PASSWORD" ftp://134.255.225.150 -e "
              set ssl:verify-certificate no;
              set net:timeout 20;
              get -O . '$USERCACHE';
              bye
            " || echo "Warnung: usercache.json nicht ladbar, Namen kommen ueber die Mojang-API."
          fi

          COUNT=$(find world/stats -name '*.json' | wc -l)
          echo "Heruntergeladene Statistikdateien: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::Keine Statistikdateien geladen, Abbruch."
            exit 1
          fi

      - name: Generate stats.json
        run: python3 generate_stats.py world stats.json

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "stats-bot"
          git config user.email "actions@github.com"
          git add stats.json uuid-names.json
          git diff --cached --quiet && echo "Keine Aenderung" && exit 0
          git commit -m "Stats update $(date -u +'%Y-%m-%d %H:%M')"
          git push
