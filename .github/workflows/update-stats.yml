name: Update stats

permissions:
  contents: write

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:        # manual run

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Find stats folder on the server
        id: locate
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SERVER_DIR: /g586731/paperspigot
        run: |
          set -euo pipefail

          ftp_run() {
            lftp -u "g586731,$FTP_PASSWORD" ftp://134.255.225.150 -e "
              set ssl:verify-certificate no;
              set net:timeout 20;
              $1
              bye
            "
          }

          # The live world is whatever level-name says in server.properties
          ftp_run "get -O . '$SERVER_DIR/server.properties';" || true
          LEVEL=$(grep -E '^level-name=' server.properties 2>/dev/null | cut -d= -f2- | tr -d '\r' || true)
          echo "level-name aus server.properties: ${LEVEL:-nicht lesbar}"

          STATS_PATH=""
          if [ -n "$LEVEL" ] && ftp_run "cls -1 '$SERVER_DIR/$LEVEL/stats';" > /dev/null 2>&1; then
            STATS_PATH="$SERVER_DIR/$LEVEL/stats"
          else
            # Fallback: search the whole account, deep enough for world folders
            echo "Welt nicht direkt gefunden, durchsuche den Server:"
            ftp_run "find -d 6 .;" > tree.txt
            sed -n '1,400p' tree.txt
            STATS_PATH=$(grep -E '/stats/?$' tree.txt | grep -viE 'plugin|update-backup|cache' \
              | head -1 | sed 's:/$::;s:^\./:/:')
          fi

          if [ -z "$STATS_PATH" ]; then
            echo "::error::Kein stats-Ordner auf dem FTP gefunden. Siehe Ordnerliste oben."
            exit 1
          fi

          echo "Statistik-Ordner: $STATS_PATH"
          echo "stats_path=$STATS_PATH" >> "$GITHUB_OUTPUT"
          echo "usercache=$SERVER_DIR/usercache.json" >> "$GITHUB_OUTPUT"

      - name: Download stats via FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          STATS_PATH: ${{ steps.locate.outputs.stats_path }}
          USERCACHE: ${{ steps.locate.outputs.usercache }}
        run: |
          set -euo pipefail
          mkdir -p world/stats

          lftp -u "g586731,$FTP_PASSWORD" ftp://134.255.225.150 -e "
            set ssl:verify-certificate no;
            set net:timeout 20;
            set cmd:fail-exit yes;
            mirror --only-newer '$STATS_PATH' world/stats;
            bye
          "

          if [ -n "$USERCACHE" ]; then
            lftp -u "g586731,$FTP_PASSWORD" ftp://134.255.225.150 -e "
              set ssl:verify-certificate no;
              set net:timeout 20;
              get -O . '$USERCACHE';
              bye
            " || echo "Warnung: usercache.json nicht ladbar, Namen kommen ueber die Mojang-API."
          fi

          COUNT=$(find world/stats -name '*.json' | wc -l)
          echo "Heruntergeladene Statistikdateien: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::Keine Statistikdateien geladen, Abbruch."
            exit 1
          fi

      - name: Generate stats.json
        run: python3 generate_stats.py world stats.json

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "stats-bot"
          git config user.email "actions@github.com"
          git add stats.json uuid-names.json
          git diff --cached --quiet && echo "Keine Aenderung" && exit 0
          git commit -m "Stats update $(date -u +'%Y-%m-%d %H:%M')"
          git push
