# GitHub Action fuer das Repo PantriMasi/smp-stats
#
# Einrichtung:
# 1. Diese Datei im Repo ablegen als: .github/workflows/update-stats.yml
# 2. generate_stats.py (aus dem tools-Ordner der Webseite) ins Repo-Root legen
# 3. Im Repo: Settings -> Secrets and variables -> Actions -> New repository secret
#    Name: FTP_PASSWORD, Wert: dein ZAP-FTP-Passwort
# 4. Unter "Actions" den Workflow einmal manuell starten (Run workflow) zum Testen
#
# Hinweis: Falls der FTP-Login direkt im Ordner g586731 landet,
# unten die Pfade von /g586731/paperspigot/... auf /paperspigot/... kuerzen.

name: Update stats

permissions:
  contents: write

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:        # manual run

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Download stats via FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          mkdir -p world/stats
          lftp -u "g586731,$FTP_PASSWORD" ftp://134.255.225.150 -e "
            set ssl:verify-certificate no;
            set net:timeout 20;
            mirror --only-newer /g586731/paperspigot/Parody/stats world/stats;
            get -O . /g586731/paperspigot/usercache.json;
            bye
          "

      - name: Generate stats.json
        run: python3 generate_stats.py world stats.json

      - name: Commit if changed
        run: |
          git config user.name "stats-bot"
          git config user.email "actions@github.com"
          git add stats.json
          git diff --cached --quiet && echo "Keine Aenderung" && exit 0
          git commit -m "Stats update $(date -u +'%Y-%m-%d %H:%M')"
          git push
