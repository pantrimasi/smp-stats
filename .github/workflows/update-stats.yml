
name: Update stats

permissions:
  contents: write

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:        # manual run

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Find stats folder on the server
        id: locate
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail

          lftp -u "g586731,$FTP_PASSWORD" ftp://134.255.225.150 -e "
            set ssl:verify-certificate no;
            set net:timeout 20;
            find -d 4 .;
            bye
          " > tree.txt

          echo "Ordnerstruktur des Servers (gekuerzt):"
          sed -n '1,200p' tree.txt

          # Any folder called stats that belongs to a world, not to a plugin
          STATS_PATH=$(grep -E '/stats/?$' tree.txt | grep -vi 'plugin' | head -1 | sed 's:/$::')
          if [ -z "$STATS_PATH" ]; then
            echo "::error::Kein stats-Ordner auf dem FTP gefunden. Siehe Ordnerliste oben."
            exit 1
          fi

          USERCACHE=$(grep -E 'usercache\.json$' tree.txt | head -1 || true)
          echo "Gefunden: $STATS_PATH"
          echo "Usercache: ${USERCACHE:-nicht gefunden}"
          echo "stats_path=$STATS_PATH" >> "$GITHUB_OUTPUT"
          echo "usercache=$USERCACHE" >> "$GITHUB_OUTPUT"

      - name: Download stats via FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          STATS_PATH: ${{ steps.locate.outputs.stats_path }}
          USERCACHE: ${{ steps.locate.outputs.usercache }}
        run: |
          set -euo pipefail
          mkdir -p world/stats

          lftp -u "g586731,$FTP_PASSWORD" ftp://134.255.225.150 -e "
            set ssl:verify-certificate no;
            set net:timeout 20;
            set cmd:fail-exit yes;
            mirror --only-newer '$STATS_PATH' world/stats;
            bye
          "

          if [ -n "$USERCACHE" ]; then
            lftp -u "g586731,$FTP_PASSWORD" ftp://134.255.225.150 -e "
              set ssl:verify-certificate no;
              set net:timeout 20;
              get -O . '$USERCACHE';
              bye
            " || echo "Warnung: usercache.json nicht ladbar, Namen kommen ueber die Mojang-API."
          fi

          COUNT=$(find world/stats -name '*.json' | wc -l)
          echo "Heruntergeladene Statistikdateien: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::Keine Statistikdateien geladen, Abbruch."
            exit 1
          fi

      - name: Generate stats.json
        run: python3 generate_stats.py world stats.json

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "stats-bot"
          git config user.email "actions@github.com"
          git add stats.json uuid-names.json
          git diff --cached --quiet && echo "Keine Aenderung" && exit 0
          git commit -m "Stats update $(date -u +'%Y-%m-%d %H:%M')"
          git push
